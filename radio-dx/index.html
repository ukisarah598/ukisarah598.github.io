      .screen {background-color: #1c1c1e !important;}
      .dock {background-color: rgba(28, 28, 28, 0.45) !important;}
      .btn {color: #ffff !important;}
      .band {background: #1c1c1e; border: none !important;}
      .powerbtn {background: #1c1c1e; border: none !important;}
      .powerbtn:hover {background-color: #464646 !important;}
      .dropbtn {background: #1c1c1e; border: none !important;}
      .dropbtn:hover {background-color: #464646 !important;}
      .dropdown-content {background: rgba(42,42,42,0.87) !important;}

      .dropdown-content i {color: white; !important;}

    button, .dropbtn, .toggle-dropdown, .control-btn {
      -webkit-tap-highlight-color: transparent; /* Hapus kotak abu-abu bawaan iOS */
      cursor: pointer;
      transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1);
      outline: none;
    }

    /* Animasi klik ala iOS (Haptic Feel) */

      transform: scale(0.9); /* Efek membal saat ditekan */

    .screen {

    .marquee-content {
      display: block;       /* Supaya bisa di-center */
      width: 100%;          /* Memenuhi wadah */

      padding-left: 0;      /* Reset padding */
      animation: none;      /* Default: DIAM (Penting!) */

    .marquee-wrapper {
      width: 90%; /* Beri jarak kiri kanan */

      overflow: hidden; /* Potong teks yang lewat */

      /* Masking gradasi (Opsional) */
      -webkit-mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
      mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
    }

    /* Animasi hanya jalan jika class .scrolling aktif */

      animation-name: samsungScroll;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    @keyframes samsungScroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

/* Animasi Running Text */

      0% { transform: translate(0, 0); }
      100% { transform: translate(-100%, 0); }

    .dropbtn {

    .dropdown {display: inline-block;}

    .dropdown-content {
      display: none; /* Default tertutup */
      position: absolute;
      right: 15px;
      top: 55px;
      background-color: var(--menu-bg);

      overflow: hidden;
      padding: 6px 0; /* Padding atas bawah ala iOS */
      border: 0.5px solid rgba(0,0,0,0.1);
    }

    /* Tampilkan saat Class .show aktif */
    .dropdown-content.show {
      display: block;
      animation: iosMenuPop 0.2s ease-out;
    }

    /* Item di dalam Menu (Link atau Button) */
    .dropdown-content a, 
    .dropdown-content button {
            display: flex;
      align-items: center;
      width: 100%;
      padding: 14px 16px;
      border: none;
      background: none;
      color: black;
      font-family: inherit;
      font-size: 16px;
      text-decoration: none;
      cursor: pointer;
      text-align: left;
      gap: 12px; /* Ini kunci agar icon dan tulisan tidak menjauh */
    }

    .dropdown-content a:last-child {
      border-bottom: none;
    }

    /* Efek Klik (Highlite) */
    .dropdown-content a:active, 
    .dropdown-content button:active {
      background-color: rgba(0, 0, 0, 0.1);
    }

    /* Khusus untuk tombol region yang punya tanda panah di kanan */
    .region-btn {
      display: flex !important;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      background: none;
      border: none;
      padding: 14px 16px; /* Disamakan dengan padding <a> Anda */
      color      :       inherit;
      font-family: inherit;
      font-size: 16px;
      cursor: pointer;
    }

    .region-btn span {
      display: flex;
      align-items: center;
      gap: 12px; /* Jarak icon ke teks agar tidak menjauh */
    }

    .region-btn .fa-chevron-right {
      transition: transform 0.3s ease;
      font-size: 0.8rem;
    }
  
    .submenu.open .region-btn .fa-chevron-right {
      transform: rotate(90deg);
    }
  
    .dropdown-content i {
      width: 20px; /* Ukuran lebar tetap agar tulisan semua rata kiri */
      text-align: center;
    }
    /* Styling untuk Submenu */
    .submenu-content {
      max-height: 0; /* Tertutup */
      overflow: hidden;
      opacity: 0;
      background-color: rgba(0, 0, 0, 0.05); /* Sedikit gelap untuk membedakan level */
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
    }

    .submenu-content a {
      padding-left: 48px !important; /* Biar menjorok ke dalam */

      opacity: 0.8;
    }

    .submenu-toggle {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .arrow {
      font-size: 10px;
      transition: transform 0.3s;
    }

    /* Class saat submenu dibuka */
    .submenu.open .submenu-content {
      max-height: 200px; /* Nilai cukup untuk menampung list kota */
      opacity: 1;
      display: block; /* Timpa display: none yang lama */
    }

    .submenu.open .arrow {
      transform: rotate(180deg);
    }
    /* Animasi Muncul */
    @keyframes iosMenuPop {
      from { opacity: 0; transform: scale(0.9) translateY(-10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .show {display: block;}

    .prevent-select {
      -webkit-user-select: none; /* Safari */
      -ms-user-select: none; /* IE 10 and IE 11 */

    ::-moz-selection { /* Code for Firefox */

    ::selection {

    * {
      -webkit-tap-highlight-color: transparent; /* Hapus warna biru saat tombol di-klik */

    input, textarea {

    ::selection {

<body class="prevent-select">
  <div class="radio-branding">Radio</div>
  
  <div class="dropdown">
    <button onclick="menuDropdown()" class="dropbtn"><i class="fa fa-ellipsis-h"></i></button>
    <div id="myDropdown" class="dropdown-content">
       <div style="padding: 10px 16px; font-size: 12px; color: gray; font-weight: bold;">APPEARANCE</div>
       <a onclick="setTheme('light')"><i class="fas fa-sun"></i><span>Light Mode</span></a>
       <a onclick="setTheme('dark')"><i class="fas fa-moon"></i><span>Dark Mode</span></a>
       <a onclick="setTheme('auto')"><i class="fas fa-magic"></i><span>Automatic</span></a>
       <div style="border-top: 0.5px solid rgba(128,128,128,0.2); margin: 5px 0;"></div>
       <a href="https://bugs-moonlightbayplus.blogspot.com/"><i class="fa fa-bug"></i><span>Report Bug</span></a>
    </div>
  </div>

  <div class="controls-top">
     <button class="powerbtn" id="powerBtn" onclick="togglePower()"><i class="fas fa-power-off"></i></button>
  </div>
  <a class="band" href="/radio">Band</a>

  <div class="screen" id="lcdScreen">
    <div class="lcd-header">
      <span id="channelCountry">OFF</span>
      <span id="channelTime">00:00</span>
    </div>
    
    <div class="freq-display" id="freqDisplay">----<sup>kHz</sup></div>
    
    <div class="marquee-wrapper">
        <div class="marquee-content channel-name" id="channelName">Power Off</div>
    </div>

    <div class="lcd-footer">
      <div class="signal-dots" id="signalDots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
      <span id="bandTypeDisplay">DX MODE</span>
    </div>
  </div>

  <div class="dock">
    <div class="controls">

        // --- 1. POWER SYSTEM ---
        function togglePower() {
            isPowerOn = !isPowerOn;
            const powerBtn = document.getElementById("powerBtn");
            const screen = document.getElementById("lcdScreen");
        
            if (isPowerOn) {
                powerBtn.style.color = "#0080ff";
                screen.style.opacity = "1";
                loadChannel(currentChannelIndex);
            } else {
                powerBtn.style.color = "#b0b0b0";
                screen.style.opacity = "0.3";
                audioPlayer.pause();
                audioSource.src = "";
                
                // Reset LCD
                freqDisplay.innerHTML = "----<sup>kHz</sup>";
                channelName.textContent = "Turn on the Radio";
                channelCountry.textContent = "";
                updateSignalStrength(0);
            }
        }
        
        // --- 2. CHANNEL SYSTEM ---
        function loadChannel(index) {
            if (!isPowerOn) return;
            
            currentChannelIndex = index;
            const channel = radioChannels[index];
            
            audioSource.src = channel.url;
            audioPlayer.load();
            audioPlayer.play().catch(() => { channelName.textContent = "Press Play"; });
        
            // Update Tampilan
            freqDisplay.innerHTML = `${parseFloat(channel.frequency).toFixed(0)}<sup>kHz</sup>`;
            channelName.textContent = channel.name;
            channelCountry.textContent = channel.country
            document.getElementById("bandDisplay").textContent = channel.band || "MW";
            
            updateMarquee();
        }
        
        // --- 3. DX FEATURES (Signal & Clock) ---
        function updateSignalStrength(level) {
            signalDots.forEach((dot, i) => {
                dot.style.background = i < level ? "#0080ff" : "#444";
                dot.style.boxShadow = i < level ? "0 0 5px #0080ff" : "none";
            });
        }
        
        function updateClock() {
            if (!isPowerOn) return;
            const now = new Date();
            channelTime.textContent = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        }
        
        // Loop untuk Signal Meter (Simulasi Sinyal Berdasarkan Buffer)
        setInterval(() => {
            if (isPowerOn && audioPlayer.readyState > 0) {
                const strength = Math.floor(Math.random() * 2) + 4; // Simulasi sinyal 4-5 bar jika play
                updateSignalStrength(audioPlayer.paused ? 0 : strength);
            }
        }, 1000);
        
        setInterval(updateClock, 1000);
        
        // --- 4. NAVIGATION ---
        function nextChannel() {
            currentChannelIndex = (currentChannelIndex + 1) % radioChannels.length;
            loadChannel(currentChannelIndex);
        }
        
        function prevChannel() {
            currentChannelIndex = (currentChannelIndex - 1 + radioChannels.length) % radioChannels.length;
            loadChannel(currentChannelIndex);
        }
        
        function nextBand() {
            currentBandIndex = (currentBandIndex + 1) % bands.length;
            document.getElementById("bandDisplay").textContent = bands[currentBandIndex];
            // Opsional: Filter channel berdasarkan band yang dipilih
        }
        
        // --- 5. MENU & THEME ---
        function menuDropdown() { document.getElementById("myDropdown").classList.toggle("show"); }
        function applyTheme() {
        const savedTheme = localStorage.getItem('user-theme') || 'auto'; // Default ke auto jika kosong
        const systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const body = document.body;
        
        if (savedTheme === 'dark') {
                body.classList.add('dark-mode');
    } else if (savedTheme === 'light') {
        body.classList.remove('dark-mode');
    } else {
        // Logika Mode Otomatis (Ikuti Sistem)
        if (systemDark) {
            body.classList.add('dark-mode');
        } else {
            body.classList.remove('dark-mode');
        }
    }
}

// Jalankan fungsi saat script dibaca (Cegah kedipan putih saat refresh)
applyTheme();

// Fungsi yang dipanggil dari Tombol Menu
function setTheme(mode) {
    localStorage.setItem('user-theme', mode);
    applyTheme();
    // Tutup dropdown setelah memilih
    const dropdown = document.getElementById("myDropdown");
    if (dropdown) dropdown.classList.remove("show");
}

// Pantau jika user ganti tema sistem saat browser sedang terbuka
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if (localStorage.getItem('user-theme') === 'auto' || !localStorage.getItem('user-theme')) {
        applyTheme();
    }
});
