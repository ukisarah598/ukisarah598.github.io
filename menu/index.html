<!DOCTYPE html>
<html lang="en-US">
<head>
    <title>Menu - MoonlightBay Plus</title>
    <script src="/head-config.js"></script>
</head>
<body>
    <div id="navbar-placeholder"></div>
  <style>
    body {
      min-height: 79vh;
    }

    .container {
      padding: 100px 45px;
      max-width: none;
    }
      
    .h3.post-title {
      display: none;
    }
      
    .post.hentry h1 {
      display: none;
    }

    .linktreecontainer .btn {
      font-family: 'Montserrat'; font-weight: 400;
    }
 
    .linktreecontainer .btn.long {
      font-size: 14px;
    }

    .linktreecontainer .btn.long:hover {
      font-size: 15px;
    }

    .info {
      padding-right: 5px;
      padding-left: 5px;
    }

    .page-header {
      margin-bottom: 11px;
      margin-left: -5px;
      font-family: SF Pro Display;
      font-size: 42px;
      font-weight: 700;
    }

    .linktreelogo {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 5px 0;
      flex-direction: column;
    }

    .linktreelogo img{
      height: 75px;
    }

    .linktreelogo p{
      font-size: 24px;
      color:#000000;
      font-weight: 600;
    }
 
    .linktreecontainer {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      margin-top: 10px;
    }

    .linktreecontainer .btn {
      text-align: center;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      height: 42px;
      padding: 5px;
      font-size: 15px;
      text-decoration: none;
      color: #fff;
      transition: 0.2s;
       /*text-transform: capitalize;*/
      background: none;
      border-bottom: 0.1px solid #6b6b6b61;
      width: 100%;
      gap: 11px;
    }

    .linktreecontainer .btn i {
      font-size: 23px;
    }

    .linktreecontainer .btn:hover {
      background: #464646;
      font-weight: 700%;
    }

    .linktreecontainer img{
      height: 28px;
      width : 28px;
      margin-right: 15px;
    }
  
    .rounded-image {
      border-radius : 200px;
      -webkit-border-radius : 200px ;
      -moz-border-radius : 200px ; }
 /* tampilan ikon sosmed */
    #socmed-icon{margin:16px 0 0}#socmed-icon i{margin:6px;font-size:22px;transition:transform .2s}#socmed-icon a{color:#444;transition:color .2s}#socmed-icon a:hover,.dark-mode #socmed-icon a:hover{color:#ff4545}#socmed-icon i:hover{transform:scale(1.3)}
/*#socmed-icon { margin:16px 0 0;list-style:none;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;padding:0 } #socmed-icon i { margin: 8px; font-size: 22px; transition: 0.2s; } #socmed-icon a { color: #444; transition: 0.2s; } #socmed-icon a:hover, .dark-mode #socmed-icon a:hover { color: #ff4545; } #socmed-icon i:hover { font-size: 28px; }*/
  
/* KHUSUS SVG */
/* Mengatur ikon SVG dalam button linktree */
    .linktreecontainer .btn svg path {
      width: 25px;  /* Ukuran default SVG */
      height: 25px;
      fill: #fff;
      transition: transform 0.2s, fill 0.2s; /* Animasi transisi perubahan ukuran dan warna */
    }

/* Efek hover untuk tombol linktree dan SVG */
    .linktreecontainer .btn:hover svg path {
      fill: #000;  /* Mengubah warna SVG saat hover */
    }

/* Aturan untuk ikon sosial media */
    #socmed-icon svg {
      width: 22px;  /* Ukuran default SVG untuk ikon sosial media */
      height: 22px;
      transition: transform 0.2s, fill 0.2s; /* Animasi transisi perubahan ukuran dan warna */
    }

/* Efek hover untuk ikon sosial media dan SVG */
    #socmed-icon a:hover svg,
    .dark-mode #socmed-icon a:hover svg {
      transform: scale(1.3);  /* Membesarkan ukuran SVG saat hover */
      fill: #ff4545;  /* Mengubah warna SVG saat hover */
    }

        @media (max-width: 767px) {
            .post.hentry {
                width: 50%;
            }               
            nav {
                display: none;
            }

            .container {
                padding: 100px 26px;
            }
    }
  </style>
<div class="container">
  <div class="page-header">Menu</div>
<div class="info">
</div>
<div class="linktreecontainer">
 <a class="btn" href="/youtube">
    <i class="fa fa-play"></i>
  YouTube
 </a>
 <a class="btn" href="https://tivie.id/channel" target="_blank">
    <i class="fa fa-calendar"></i>
  Jadwal Acara
 </a>
 <a class="btn" href="/search/label/Changelog">
    <i class="fa fa-book"></i>
  Changelog
 </a>
 <a class="btn" href="https://bugs-moonlightbayplus.blogspot.com/">
    <i class="fa fa-bug"></i>
  Laporkan Bug
 </a>
 <a class="btn" href="/about">
    <i class="fa fa-info-circle"></i>
  Tentang
 </a>
 <a class="btn" href="/juaravision">
    <i class="fa fa-tv"></i>
  WATCHMAN
 </a>
</div>
</div>
  <script src="/main.js"></script>
</body>
</html>
