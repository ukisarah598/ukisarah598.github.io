    button, .dropbtn, .toggle-dropdown, .control-btn {

    /* Animasi klik ala iOS (Haptic Feel) */

      animation: none;      /* Default: DIAM (Penting!) */

    .marquee-wrapper {
      width: 90%; /* Beri jarak kiri kanan */
      max-width: 280px; /* Batasi lebar maksimal agar tidak terlalu lebar di layar besar */
      height: 26px; /* Tinggi tetap */
      margin: 0 auto; /* Posisi tengah */

      overflow: hidden; /* Potong teks yang lewat */

      /* Masking gradasi (Opsional) */
      -webkit-mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
      mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
    }

    /* Animasi hanya jalan jika class .scrolling aktif */
    .scrolling {
      display: inline-block !important;
      width: auto !important; /* Lepas width 100% */
      text-align: left !important;
      padding-left: 100%;     /* Jarak start animasi */

      animation-name: samsungScroll;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    @keyframes samsungScroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    /* Animasi Running Text */
    @keyframes marquee {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-100%, 0); }

    .channel-select {

      border: 2px solid #ffff;

    .band {

    .powerbtn:hover {
      background-color: #e6e6e6;
    }

    .dropbtn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #dcdcdc;
      color: #0080ff;
      font-size: 27px;
      align-items: center;
      justify-content: center;
      margin: 10px;
      position: absolute;
      top: 34px;
      right: 27px;
      display: flex;
      cursor: pointer;
      border: none;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); /* Animasi halus */
    }

    .dropbtn:hover {
      background-color: #e6e6e6;
    }

    .dropdown {display: inline-block;}

    .dropdown-content {
      display: none; /* Default tertutup */
      position: absolute;
      right: 15px;
      top: 55px;
      background-color: var(--menu-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      min-width: 220px; /* Diperlebar supaya tidak sesak */
      border-radius: 14px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      z-index: 9999;
      overflow: hidden;
      padding: 6px 0; /* Padding atas bawah ala iOS */
      border: 0.5px solid rgba(0,0,0,0.1);
    }

    /* Tampilkan saat Class .show aktif */
    .dropdown-content.show {
      display: block;
      animation: iosMenuPop 0.2s ease-out;
    }

    /* Item di dalam Menu (Link atau Button) */
    .dropdown-content a, 
    .dropdown-content button {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 14px 16px;
      border: none;
      background: none;
      color: black;
      font-family: inherit;
      font-size: 16px;
      text-decoration: none;
      cursor: pointer;
      text-align: left;
      gap: 12px; /* Ini kunci agar icon dan tulisan tidak menjauh */
    }

    .dropdown-content a:last-child {
      border-bottom: none;
    }

    /* Efek Klik (Highlite) */
    .dropdown-content a:active, 
    .dropdown-content button:active {
      background-color: rgba(0, 0, 0, 0.1);
    }

    /* Khusus untuk tombol region yang punya tanda panah di kanan */
    .region-btn {
      display: flex !important;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      background: none;
      border: none;
      padding: 14px 16px; /* Disamakan dengan padding <a> Anda */
      color      :       inherit;
      font-family: inherit;
      font-size: 16px;
      cursor: pointer;
    }

    .region-btn span {
      display: flex;
      align-items: center;
      gap: 12px; /* Jarak icon ke teks agar tidak menjauh */
    }

    .region-btn .fa-chevron-right {
      transition: transform 0.3s ease;
      font-size: 0.8rem;
    }
  
    .submenu.open .region-btn .fa-chevron-right {
      transform: rotate(90deg);
    }
  
    .dropdown-content i {
      width: 20px; /* Ukuran lebar tetap agar tulisan semua rata kiri */
      text-align: center;
    }
    /* Styling untuk Submenu */
    .submenu-content {
      max-height: 0; /* Tertutup */
      overflow: hidden;
      opacity: 0;
      background-color: rgba(0, 0, 0, 0.05); /* Sedikit gelap untuk membedakan level */
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
    }

    .submenu-content a {
      padding-left: 48px !important; /* Biar menjorok ke dalam */
      font-size: 15px !important;
      opacity: 0.8;
    }

    .submenu-toggle {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .arrow {
      font-size: 10px;
      transition: transform 0.3s;
    }

    /* Class saat submenu dibuka */
    .submenu.open .submenu-content {
      max-height: 200px; /* Nilai cukup untuk menampung list kota */
      opacity: 1;
      display: block; /* Timpa display: none yang lama */
    }

    .submenu.open .arrow {
      transform: rotate(180deg);
    }
    /* Animasi Muncul */
    @keyframes iosMenuPop {
      from { opacity: 0; transform: scale(0.9) translateY(-10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .show {display: block;}

    .prevent-select {
      -webkit-user-select: none; /* Safari */
      -ms-user-select: none; /* IE 10 and IE 11 */
      user-select: none; /* Standard syntax */
    }

    ::-moz-selection { /* Code for Firefox */
      color: #000;
      background: $(maincolor);
    }

    * {
      -webkit-tap-highlight-color: transparent; /* Hapus warna biru saat tombol di-klik */
      -webkit-touch-callout: none;              /* Matikan menu klik kanan/tahan di gambar */
      user-select: none;                        /* Cegah user copy-paste teks agar terasa seperti app */
    }

    input, textarea {
      user-select: text;                        /* Biarkan teks tetap bisa diisi di kolom input */
    }

    ::selection {
      color: #000; 
      background: $(maincolor);
    }

    .version-info {
      text-align: center;
      color: #999999; 
      padding: 10px 16px; 
      font-family: 'SF Pro Display';
      font-size: small;
    }

  </style>

    function extractFrequency(name) {
      const match = name.match(/(\d+(\.\d+)?)/);
      return match ? match[0] : '----';

      return name.replace(/(\d+(\.\d+)?\s*(MHz -|kHz -))/i, "").trim();

    function updateSignalBars(pingMs) {
      signalBars.forEach(bar => bar.classList.remove("active"));

      if (pingMs < 100) {
        signalBars.forEach(bar => bar.classList.add("active"));
      } else if (pingMs < 200) {
        signalBars[0].classList.add("active");
        signalBars[1].classList.add("active");
        signalBars[2].classList.add("active");
      } else if (pingMs < 400) {
        signalBars[0].classList.add("active");
        signalBars[1].classList.add("active");
      } else if (pingMs < 800) {
        signalBars[0].classList.add("active");
      }
      // else: lost all
    }

    function measurePing(url, callback) {
      const controller = new AbortController();
      const signal = controller.signal;
      const start = performance.now();

      fetch(url, {
        method: 'HEAD',
        mode: 'no-cors',
        cache: 'no-store',
        signal
      }).finally(() => {
        const end = performance.now();
        const ping = Math.round(end - start);
        callback(ping);
      });

      setTimeout(() => controller.abort(), 3000);
    }

    function updateMediaSession(channel) { // Pastikan parameternya 'channel'
      if ('mediaSession' in navigator) {
        // Mengambil data bersih dari objek channel
        const freq = extractFrequency(channel.name);
        const name = extractChannelTitle(channel.name);
        
        navigator.mediaSession.metadata = new MediaMetadata({
          title: freq + " MHz",
          artist: name,
          album: "FM Radio",
          artwork: [{ 
            src: "https://via.placeholder.com/96", 
            sizes: "512x512", 
            type: "image/png" 
          }]
        });

        navigator.mediaSession.setActionHandler("previoustrack", prevChannel);
        navigator.mediaSession.setActionHandler("nexttrack", nextChannel);
        navigator.mediaSession.setActionHandler("play", () => {
            if (!isPowerOn) togglePower();
        });
        navigator.mediaSession.setActionHandler("pause", () => {
            if (isPowerOn) togglePower();
        });
      }
    }

    async function updateLiveMetadata(channel) {
    if (audioPlayer.paused) {
        return; 
    }
      
    if (!channel.hasMetadata || !isPowerOn) return;

    let apiUrl = "";
    
    // Sesuaikan URL API berdasarkan jenis server radionya
    if (channel.apiType === "radiojar") {
        apiUrl = `https://www.radiojar.com/api/stations/${channel.apiID}/now_playing/`;
    } else if (channel.apiType === "cloudmu") {
        apiUrl = `https://s2.cloudmu.id/api/v2/node/${channel.apiID}/`;
    }

    try {
        const response = await fetch(apiUrl);
        const data = await response.json();
        
        let trackInfo = "";
        if (channel.apiType === "radiojar") {
            trackInfo = data.artist && data.title ? `${data.artist} - ${data.title}` : "LIVE BROADCAST";
        } else if (channel.apiType === "cloudmu") {
            trackInfo = data.title || "LIVE BROADCAST";
        }

        // Tampilkan ke layar
        songTitle.textContent = trackInfo.toUpperCase();

        // --- PERBAIKAN: UKUR ULANG SETIAP LAGU BERUBAH ---
        // Kita beri sedikit delay agar DOM sempat render teks baru
        setTimeout(() => {
             updateMarquee('songTitle');
        }, 100);
        // -------------------------------------------------
        
        // Update juga ke Media Session (Layar Kunci HP)
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata.album = trackInfo; 
        }
    } catch (error) {
        console.log("Gagal mengambil metadata:", error);
        // Jangan lupa update marquee juga kalau error
        songTitle.textContent = "SIGNAL CONNECTED";
        updateMarquee('songTitle');
    }
}

    function updateMarquee(elementId) {
    const el = document.getElementById(elementId);
    if (!el) return;
    
    // Cek apakah elemen sedang disembunyikan (display: none)? Kalau iya, stop.
    if (window.getComputedStyle(el).display === 'none') return;

    const wrapper = el.parentElement;

    // 1. Reset Total: Matikan animasi, kembalikan ke posisi awal
    el.classList.remove('scrolling');
    el.style.animation = 'none';
    el.style.paddingLeft = '0';
    el.style.transform = 'translateX(0)'; // Reset posisi transform
    
    // 2. Siapkan untuk pengukuran
    el.style.display = 'inline-block'; 
    el.style.width = 'auto'; // Lepas batasan lebar
    el.style.whiteSpace = 'nowrap';

    // 3. Ukur dengan delay sangat singkat (agar browser "sadar" style baru)
    setTimeout(() => {
        const textWidth = el.scrollWidth; // Gunakan scrollWidth untuk akurasi penuh konten
        const containerWidth = wrapper.clientWidth; // Gunakan clientWidth wadah

        // DEBUG di Console (Bisa dihapus nanti)
        // console.log(`Ukur ${elementId}: Teks ${textWidth}px vs Wadah ${containerWidth}px`);

        if (textWidth > containerWidth) {
            // JIKA KEPANJANGAN
            el.classList.add('scrolling');
            
            // Rumus durasi: Semakin panjang teks, semakin lama (agar kecepatan konstan)
            // Kecepatan dasar: 50px per detik (bisa diatur angkanya)
            const duration = (textWidth + containerWidth) / 50; 
            
            el.style.animation = `samsungScroll ${duration}s linear infinite`;
        } else {
            // JIKA MUAT (Pendek)
            el.classList.remove('scrolling');
            el.style.animation = 'none';
            el.style.display = 'block'; // Kembali ke block
            el.style.width = '100%';    // Lebar penuh
            el.style.textAlign = 'center'; // Rata tengah
        }
    }, 50);
}
    
    // Close the dropdown if the user clicks outside of it
    window.onclick = function(event) {
    if (!event.target.matches('.dropbtn')) {
        var dropdowns = document.getElementsByClassName("dropdown-content");
        for (var i = 0; i < dropdowns.length; i++) {
            var openDropdown = dropdowns[i];
            if (openDropdown.classList.contains('show')) {
                openDropdown.classList.remove('show');
            }
        }
    }
}
  </script>
</body>
