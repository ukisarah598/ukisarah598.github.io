<!DOCTYPE html>
<html lang="en-US">
<head>
    <title>News - MoonlightBay Plus</title>
    <script src="/head-config.js"></script>
    <style>
        /* Perbaikan CSS agar rapi dan identik dengan versi lama */
        body {
            background-color: #121212; /* Warna latar gelap khas MoonlightBay */
            color: white;
            margin: 0;
            font-family: 'Montserrat', sans-serif;
        }

        .container {
            padding: 20px;
            margin-top: 62px;
        }

        .nav-links li a {
            font-family: SF Pro Display;
        }
        
        .feed-container {
            max-width: 1200px;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px; /* Jarak antar berita */
        }

        .feed-item {
            background: none;
            display: flex;
            flex-direction: column;
        }

        /* PERBAIKAN GAMBAR: Memaksa ukuran seragam & proporsional */
        .feed-item img {
            width: 100%;
            height: 190px;
            object-fit: cover; /* Gambar tidak akan gepeng */
            border-radius: 14px;
            margin-bottom: 15px;
        }

        .feed-item h3 {
            margin: 0 0 10px;
            font-size: 1.25rem;
            line-height: 1.4;
        }

        .feed-item a {
            text-decoration: none;
            color: #fff;
            font-weight: 700;
        }

        .feed-item a:hover {
            color: #00e5ff; /* Efek hover biru neon */
        }

        .feed-item p {
            margin: 0;
            color: #cdcdcd;
            font-size: 0.9rem;
            line-height: 1.5;
            flex-grow: 1;
        }

        .feed-item time {
            display: block;
            margin-top: 12px;
            font-size: 0.8rem;
            color: #999;
        }

        @media (max-width: 768px) {
            .feed-container {
                grid-template-columns: 1fr;
                padding: 5px;
            }
        }
    </style>
</head>
<body>

    <div id="navbar-placeholder"></div>

    <div class="container">
        <div class="feed-container" id="rss-feed"></div>
    </div>

    <script src="/main.js"></script>

    <script>
        const rssUrl = "https://www.antaranews.com/rss/terkini.xml";
        const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

        function timeAgo(dateString) {
            const now = new Date();
            // Perbaikan untuk mencegah error di browser Safari/iOS
            const then = new Date(dateString.replace(/-/g, '/')); 
            const seconds = Math.floor((now - then) / 1000);

            const intervals = [
                { label: 'year', seconds: 31536000 },
                { label: 'month', seconds: 2592000 },
                { label: 'week', seconds: 604800 },
                { label: 'day', seconds: 86400 },
                { label: 'h', seconds: 3600 },
                { label: 'm', seconds: 60 },
                { label: 's', seconds: 1 },
            ];

            for (const interval of intervals) {
                const count = Math.floor(seconds / interval.seconds);
                if (count >= 1) {
                    return `${count}${interval.label} ago`;
                }
            }
            return 'Just now';
        }
        
        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById("rss-feed");
                data.items.slice(0, 30).forEach(item => {
                    const div = document.createElement("div");
                    div.className = "feed-item";

                    // 1. Ambil URL Gambar dengan aman
                    let imgSrc = item.thumbnail || (item.enclosure && item.enclosure.link) || "";
                    
                    // 2. Trik Sulap: Bersihkan semua tag HTML dari Deskripsi agar rapi
                    let cleanDesc = item.description.replace(/<[^>]*>?/gm, '');
                    cleanDesc = cleanDesc.substring(0, 150) + "...";

                    // 3. Render elemen HTML dengan format baru
                    div.innerHTML = `
                        ${imgSrc ? `<img src="${imgSrc}" alt="Thumbnail">` : ''}
                        <h3><a href="${item.link}" target="_blank">${item.title}</a></h3>
                        <p>${cleanDesc}</p>
                        <time>${timeAgo(item.pubDate)}</time>
                    `;
                    container.appendChild(div);
                });
            })
            .catch(error => {
                document.getElementById("rss-feed").innerHTML = "<p style='text-align:center;'>Gagal memuat berita terkini.</p>";
                console.error("Error fetching RSS feed:", error);
            });
    </script>
</body>
</html>
