body {

/* Linktree by IzRu Berbagi */
.linktreelogo {
 width: 100%;
 display: flex;
 justify-content: center;
 align-items: center;
 padding: 5px 0;
 flex-direction: column;
}

.linktreelogo img{
 height: 75px;
}

.linktreelogo p{
 font-size: 24px;
 color:#000000;
 font-weight: 600;
}
 

.linktreecontainer {
 display: flex;
 flex-direction: column;
 justify-content: center;
 align-items: center;
 width: 100%;
margin-top: 10px;
}

.linktreecontainer .btn {
 text-align: center;
 display: flex;
 justify-content: center;
 align-items: center;
 height: 50px;
 border-radius: 5px;
 padding: 5px;
 margin-top: 15px;
 font-size: 17px;
 text-decoration: none;
 color: #fff;
 transition: 0.4s;
 /*text-transform: capitalize;*/
 background: #000000;
    border: 1px solid #f1f1f1;
    width: 102%;
 
}

.linktreecontainer .btn i {
 margin-right: 10px;
 font-size: 25px;
}

.linktreecontainer .btn:hover {
 background: #fff;
    font-weight: 700%;
    color: black;
    font-size: 18px;
}
.linktreecontainer img{
 height: 28px;
    width : 28px;
    margin-right: 15px;
}
  
.rounded-image {
border-radius : 200px;
-webkit-border-radius :
200px ;
-moz-border-radius :
200px ; }
/* tampilan ikon sosmed */
#socmed-icon{margin:16px 0 0}#socmed-icon i{margin:6px;font-size:22px;transition:transform .2s}#socmed-icon a{color:#444;transition:color .2s}#socmed-icon a:hover,.dark-mode #socmed-icon a:hover{color:#ff4545}#socmed-icon i:hover{transform:scale(1.3)}
/*#socmed-icon { margin:16px 0 0;list-style:none;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;padding:0 } #socmed-icon i { margin: 8px; font-size: 22px; transition: 0.2s; } #socmed-icon a { color: #444; transition: 0.2s; } #socmed-icon a:hover, .dark-mode #socmed-icon a:hover { color: #ff4545; } #socmed-icon i:hover { font-size: 28px; }*/
  
/* KHUSUS SVG */
/* Mengatur ikon SVG dalam button linktree */
.linktreecontainer .btn svg path {
  width: 25px;  /* Ukuran default SVG */
  height: 25px;
  fill: #fff;
  transition: transform 0.2s, fill 0.2s; /* Animasi transisi perubahan ukuran dan warna */
}

/* Efek hover untuk tombol linktree dan SVG */
.linktreecontainer .btn:hover svg path {
  fill: #000;  /* Mengubah warna SVG saat hover */
}

/* Aturan untuk ikon sosial media */
#socmed-icon svg {
  width: 22px;  /* Ukuran default SVG untuk ikon sosial media */
  height: 22px;
  transition: transform 0.2s, fill 0.2s; /* Animasi transisi perubahan ukuran dan warna */
}

/* Efek hover untuk ikon sosial media dan SVG */
#socmed-icon a:hover svg,
.dark-mode #socmed-icon a:hover svg {
  transform: scale(1.3);  /* Membesarkan ukuran SVG saat hover */
  fill: #ff4545;  /* Mengubah warna SVG saat hover */
}
</style>
