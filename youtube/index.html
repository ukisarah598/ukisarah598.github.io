<!DOCTYPE html>
<html lang="en-US">
<head>
    <title>Videos - MoonlightBay Plus</title>
    <script src="/head-config.js"></script>
</head>
<body>
    <div id="navbar-placeholder"></div>
    <div class="container">
  <style>
    body {
      padding: 0px;
      min-height: 79vh;
    }
    .page-header {
      margin-bottom: 11px;
      margin-left: -5px;
      font-family: SF Pro Display;
      font-size: 42px;
      font-weight: 800;
    }

    .container { 
      padding: 93px 20px; 
      max-width: 1200px; 
      margin: auto; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 28px;
    }

    .grid image {
      border-radius: 13px;
    }

    .card {
      background: none;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      overflow: hidden; /* Mengunci konten di dalam */
      transition: none; /* Jangan beri transisi pada card-nya sendiri */  
    }

    .card img {
      border-radius: 7px;
    }

    /* Container pembungkus thumbnail */
    .thumb-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-radius: 10px;
    }
      
    .thumbnail {
      width: 100%;
      aspect-ratio: 16 / 9;
      height: auto;
      border-radius: 10px;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease; /* Efek zoom saat dihover */
    }

    /* Overlay Gelap & Tombol Play */
    .play-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4); /* Background hitam transparan */
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0; /* Awalnya tidak terlihat */
      transition: opacity 0.3s ease;
    }

    .play-overlay i {
      color: white;
      font-size: 3rem;
      filter: drop-shadow(0 0 10px rgba(0, 229, 255, 0.8)); /* Efek glow biru MoonlightBay */
    }

    /* --- EFEK HOVER --- */

    /* Munculkan tombol play saat kartu disentuh/hover */
    .card:hover .play-overlay {
      opacity: 1;
    }

    /* Sedikit efek zoom pada gambar agar lebih hidup */
    .card:hover .thumbnail {
      transform: scale(1.05);
    }

    .post img, table.tr-caption-container {
      color: #ffffff00;
      margin: 0 0 6px;
    }

    .info {
      text-align: left;
      padding: 12px 0px;
    }

    .title {
      font-size: 20px;
      font-weight: bold;
      margin: 0 0 5px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2; /* Membatasi maksimal 2 baris tulisan */
      -webkit-box-orient: vertical;
      overflow: hidden; /* Sembunyikan sisa tulisan jika terlalu panjang */
      min-height: 2.6em; /* Mengunci tinggi area judul agar grid tidak naik-turun */
    }

    .time {
      color: #666;
      font-size: 14px;
    }

    .wrapping {
      padding: 0px!important;
    }

    @media (max-width: 832px) {
        .thumbnail {
          border-radius: 0px;
          height: auto !important;
        }

        .thumb-wrapper, .thumbnail {
          border-radius: 0px;
        }
        /* Di mobile, tombol play bisa dibuat selalu muncul atau tetap hover sesuai selera */
        .play-overlay {
          opacity: 0.8; /* Munculkan sedikit di mobile agar user tahu itu video */
        }
        .play-overlay i {
          font-size: 2.5rem;
        }
    }
  </style>
  <div class="grid" id="feedContainer"></div>

  <script>
    const rssURL = 'https://www.youtube.com/feeds/videos.xml?channel_id=UCO8r4Draz-b4SiUBI-YS1EQ';
    const totalToLoad = 100; // change to 200, 300, etc. if needed
    const batchSize = 25;

    async function loadRSSFeed() {
  const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssURL)}`);
  const data = await response.json();

  const container = document.getElementById('feedContainer');
  data.items.slice(0, 90).forEach(item => {
    const timeAgo = timeSince(new Date(item.pubDate));
    const thumbnail = item.thumbnail || 'https://via.placeholder.com/320x180?text=No+Image';

    const html = `
  <a href="${item.link}" target="_blank" class="card" style="text-decoration: none; color: inherit;">
    <div class="thumb-wrapper">
      <img src="${thumbnail}" alt="Thumbnail" class="thumbnail" />
      <div class="play-overlay">
        <i class="fa-solid fa-play"></i>
      </div>
    </div>
    <div class="info">
      <div class="title">${item.title}</div>
      <div class="time">${timeAgo} ago</div>
    </div>
  </a>
`;
    container.insertAdjacentHTML('beforeend', html);
  });
}

    function timeSince(date) {
      const seconds = Math.floor((new Date() - date) / 1000);
      const intervals = [
        { label: "year", seconds: 31536000 },
        { label: "month", seconds: 2592000 },
        { label: "day", seconds: 86400 },
        { label: "hour", seconds: 3600 },
        { label: "minute", seconds: 60 },
        { label: "second", seconds: 1 }
      ];
      for (const interval of intervals) {
        const count = Math.floor(seconds / interval.seconds);
        if (count >= 1) {
          return `${count} ${interval.label}${count !== 1 ? 's' : ''}`;
        }
      }
      return "just now";
    }

    loadRSSFeed();
  </script>
    </div>
  <script src="/main.js"></script>
</body>
</html>
